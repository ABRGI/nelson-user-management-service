# Nelson user-management-service — entry point. Graph leaves under .claude/knowledge/.
# Compact machine view; full prose in README if present.
schema: 1
repo: nelson-user-management-service
purpose: >-
  Global (cross-tenant) user auth for Nelson. Owns Cognito integration, user login,
  password flows, role management. Deployed as AWS Lambda functions fronted by API
  Gateway; locally runnable as an Express server (index_local.js).
role_in_ecosystem: >-
  Single source of truth for "who can use Nelson". Called by every Nelson tenant
  for login + refresh-token exchange, including by nelson-assistant (NELSON_USER_MGMT_BASE_URL).

index:
  - path: .claude/knowledge/flow.yaml
    when: You need to understand the auth flow (password login, refresh-token exchange, reset, confirm).
  - path: .claude/knowledge/endpoints.yaml
    when: You need the HTTP surface — paths, methods, payload shapes.
  - path: .claude/knowledge/cognito.yaml
    when: Questions about Cognito pool, user attributes, roles, or the DynamoDB user table.
  - path: .claude/knowledge/deploys.yaml
    when: You are deploying, debugging Lambda, or touching the IAM/env config.
  - path: .claude/knowledge/gotchas.yaml
    when: You hit an unexpected error on login/refresh.

absolute_rules:
  - This service WRITES to Cognito + DynamoDB. The Nelson Assistant must NEVER call its write endpoints directly (signUp, adminResetPassword, changePassword, updateUser, confirmForgotPassword). Escalate instead.
  - Safe reads: POST /api/user/login (password OR refresh-token branch — used by Nelson assistant for refresh exchange), GET /api/user/user, GET /api/user/listusers, GET /api/user/roles.
